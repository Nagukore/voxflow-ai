<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoxFlow — Voice-First AI Agent</title>
  <meta name="description" content="VoxFlow is a voice-first intelligent AI agent that helps you retrieve information, understand context, and take actions through natural conversation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/voxflow-logo.svg" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Ambient Background -->
    <div class="ambient-bg">
      <div class="ambient-orb orb-1"></div>
      <div class="ambient-orb orb-2"></div>
      <div class="ambient-orb orb-3"></div>
    </div>

    <!-- Header -->
    <header id="app-header">
      <div class="header-brand">
        <svg class="brand-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="url(#brandGrad)" stroke-width="2.5" fill="none"/>
          <path d="M14 25 L14 15 L20 10 L26 15 L26 25" stroke="url(#brandGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="20" cy="20" r="3" fill="url(#brandGrad)"/>
          <defs>
            <linearGradient id="brandGrad" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#6C63FF"/>
              <stop offset="100%" stop-color="#00D4AA"/>
            </linearGradient>
          </defs>
        </svg>
        <h1 class="brand-name">VoxFlow</h1>
      </div>
      <div class="header-status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Ready</span>
      </div>
    </header>

    <!-- Main Chat Area -->
    <main id="chatArea">
      <div id="chatMessages" class="chat-messages">
        <!-- Welcome message -->
        <div class="message assistant-message welcome-message" id="welcomeMessage">
          <div class="message-avatar">
            <svg viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="14" stroke="url(#avatarGrad)" stroke-width="2" fill="none"/>
              <circle cx="16" cy="16" r="4" fill="url(#avatarGrad)"/>
              <defs>
                <linearGradient id="avatarGrad" x1="0" y1="0" x2="32" y2="32">
                  <stop offset="0%" stop-color="#6C63FF"/>
                  <stop offset="100%" stop-color="#00D4AA"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="message-content">
            <p class="message-greeting">Hey there! 👋</p>
            <p>I'm <strong>VoxFlow</strong>, your voice-first AI assistant. Tap the mic and start talking, or type below.</p>
            <div class="quick-actions">
              <button class="quick-action-btn" data-query="What can you do?">What can you do?</button>
              <button class="quick-action-btn" data-query="Set a reminder">Set a reminder</button>
              <button class="quick-action-btn" data-query="Search for something">Search for something</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer id="inputArea">
      <div class="input-container">
        <!-- Mic Button -->
        <button id="micBtn" class="mic-btn" aria-label="Start voice input" title="Tap to speak">
          <div class="mic-pulse-ring"></div>
          <div class="mic-pulse-ring ring-2"></div>
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <svg class="mic-stop-icon hidden" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>

        <!-- Text Input -->
        <div class="text-input-wrapper">
          <input
            type="text"
            id="textInput"
            class="text-input"
            placeholder="Type a message or tap the mic..."
            autocomplete="off"
          />
          <button id="sendBtn" class="send-btn" aria-label="Send message" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Live Transcript -->
      <div id="liveTranscript" class="live-transcript hidden">
        <div class="transcript-wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p id="transcriptText" class="transcript-text">Listening...</p>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
